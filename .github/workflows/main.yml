name: Generate Code with ChatGPT on Issue Creation
on:
  issues:
    types: [opened, reopened, labeled]

jobs:
  checkout-and-generate:
    if: contains(github.event.issue.labels.*.name, 'autocoder-bot')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Make script executable
        run: chmod +x ./scripts/script.sh
  
      - name: Run interaction script
        # working-directory: ./scripts
        id: generate_code
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.event.repository.name }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          ./scripts/script.sh ${{ env.GITHUB_TOKEN }} ${{ env.REPOSITORY }} ${{ env.ISSUE_NUMBER}} ${{ env.OPENAI_API_KEY }}

      - name: Commit files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Add generated code from ChatGPT" || echo "No changes to commit"
          git push origin HEAD:main

      - name: Create pull request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Add generated code from ChatGPT"
          title: "Add generated code from ChatGPT"
          body: "This pull request contains code generated by ChatGPT based on the issue description."
          labels: "autocoder-bot"
          base: main
          branch: autocoder-branch-${{ github.event.issue.number }}

      - name: Post checkout repository
        uses: peter-evans/create-or-update-comment@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.issue.number }}
          body: "The repository has been checked out and the code generation process has started. A pull request will be created once the code is generated."

      - name: Complete job
        run: echo "Code generation process completed."